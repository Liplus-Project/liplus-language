name: CD - snapshot tag

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: cd-snapshot-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Create build tag (JST date + sequence) via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # JST date prefix (today's build tag namespace)
          DATE="$(TZ=Asia/Tokyo date +%Y-%m-%d)"
          PREFIX="build-${DATE}."

          # Resolve max existing sequence for today via GitHub API.
          # matching-refs returns only refs matching the prefix; no full ref
          # fetch involved. Avoids the "fatal error in commit_refs" failure
          # that occurs when push-time ref negotiation hits server-side
          # commit_refs storage under large cumulative tag count (the prior
          # checkout@v4 + git push code path inflated local ref state via
          # `+refs/tags/*:refs/tags/*` then triggered the server error).
          # First-of-day case: matching-refs returns [], max // 0 yields 0.
          max_seq="$(
            gh api "repos/${REPO}/git/matching-refs/tags/${PREFIX}" \
              --jq "[.[].ref | gsub(\"refs/tags/${PREFIX}\"; \"\") | tonumber] | max // 0"
          )"
          next_seq=$((max_seq + 1))
          TAG="${PREFIX}${next_seq}"

          echo "Creating tag ${TAG} at ${TARGET_SHA}"

          # Create tag ref via API. No checkout, no local git state, no fetch.
          gh api "repos/${REPO}/git/refs" --method POST \
            -f ref="refs/tags/${TAG}" \
            -f sha="${TARGET_SHA}"
