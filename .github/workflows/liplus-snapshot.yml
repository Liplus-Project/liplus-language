name: CD - snapshot tag

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: cd-snapshot-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target SHA
        id: resolve
        run: |
          echo "sha=${{ github.event.pull_request.merge_commit_sha }}" >> $GITHUB_OUTPUT

      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Create build tag (JST date + sequence)
        env:
          TARGET_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail

          # JST date prefix (today's build tag namespace)
          DATE="$(TZ=Asia/Tokyo date +%Y-%m-%d)"
          PREFIX="build-${DATE}."

          # Fetch only today's prefix tags via refspec (avoid full --tags fetch
          # which inflates local ref set and pressures GitHub's commit_refs
          # storage on push, observed to cause "fatal error in commit_refs"
          # with large cumulative tag count). `|| true` covers the first-of-day
          # case where no matching tag exists yet.
          git fetch origin "+refs/tags/${PREFIX}*:refs/tags/${PREFIX}*" || true

          echo "Resolving next sequence for ${PREFIX}* (JST)"

          # Find max existing sequence number for today's prefix
          max_seq="$(
            git tag -l "${PREFIX}[0-9]*" \
              | sed -E "s/^${PREFIX}//" \
              | sort -n \
              | tail -1
          )"

          # Default when no tag exists
          : "${max_seq:=0}"

          next_seq=$((max_seq + 1))
          TAG="${PREFIX}${next_seq}"

          echo "Tagging ${TAG} at ${TARGET_SHA}"
          git tag "${TAG}" "${TARGET_SHA}"
          # Explicit refspec on push to minimize ref advertisement scope
          git push origin "refs/tags/${TAG}:refs/tags/${TAG}"
